<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=4096, initial-scale=1.0" />
    <title>SAMO DANNI EOOD Developer Header</title>
    <style>
      :root {
        --bg-1: #050918;
        --bg-2: #0a1130;
        --bg-3: #163179;
        --bg-4: #254dff;
        --ink-1: #fbfcff;
        --ink-2: #c6d2ff;
        --ink-3: #95a9f2;
        --line: rgba(255, 255, 255, 0.12);
        --panel: rgba(255, 255, 255, 0.06);
        --panel-strong: rgba(255, 255, 255, 0.12);
        --shadow: rgba(0, 0, 0, 0.3);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 4096px;
        height: 2304px;
        overflow: hidden;
        color: var(--ink-1);
        background:
          radial-gradient(circle at 18% 18%, rgba(74, 111, 255, 0.24), transparent 24%),
          radial-gradient(circle at 79% 26%, rgba(95, 80, 255, 0.14), transparent 28%),
          radial-gradient(circle at 70% 75%, rgba(22, 90, 255, 0.18), transparent 28%),
          linear-gradient(130deg, var(--bg-1) 0%, var(--bg-2) 46%, var(--bg-3) 82%, #1d3ec4 100%);
        font-family: "Avenir Next", "SF Pro Display", "Segoe UI", sans-serif;
      }

      body::before,
      body::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      body::before {
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.038) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.038) 1px, transparent 1px);
        background-size: 120px 120px;
        mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.35), rgba(0, 0, 0, 0.08));
      }

      body::after {
        background:
          linear-gradient(90deg, rgba(6, 10, 29, 0.7), rgba(6, 10, 29, 0.1) 34%, rgba(6, 10, 29, 0) 52%),
          linear-gradient(180deg, rgba(8, 12, 30, 0.05), rgba(8, 12, 30, 0.26));
      }

      .canvas {
        position: relative;
        width: 100%;
        height: 100%;
        padding: 176px 188px;
      }

      .frame {
        position: relative;
        width: 100%;
        height: 100%;
        border-radius: 64px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.015)),
          linear-gradient(135deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.1),
          0 40px 120px var(--shadow);
        overflow: hidden;
      }

      .frame::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 84% 20%, rgba(111, 103, 255, 0.16), transparent 22%),
          radial-gradient(circle at 72% 76%, rgba(44, 114, 255, 0.22), transparent 26%);
      }

      .frame::after {
        content: "";
        position: absolute;
        left: 760px;
        bottom: 118px;
        width: 980px;
        height: 2px;
        background: linear-gradient(90deg, rgba(255, 255, 255, 0.22), transparent);
      }

      .content {
        position: absolute;
        left: 760px;
        top: 50%;
        width: 1650px;
        transform: translateY(-50%);
        z-index: 2;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 24px;
        margin: 0 0 42px;
        color: var(--ink-2);
        font-size: 46px;
        font-weight: 650;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      .eyebrow::before {
        content: "";
        width: 110px;
        height: 2px;
        background: linear-gradient(90deg, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.18));
      }

      h1 {
        margin: 0;
        font-size: 186px;
        line-height: 0.9;
        letter-spacing: -0.065em;
        font-weight: 760;
      }

      .subline {
        margin: 40px 0 0;
        color: var(--ink-2);
        font-size: 54px;
        line-height: 1.12;
        letter-spacing: -0.02em;
        font-weight: 540;
      }

      .meta-row {
        display: flex;
        gap: 24px;
        flex-wrap: wrap;
        margin-top: 72px;
      }

      .pill {
        padding: 24px 34px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: var(--panel);
        color: var(--ink-1);
        font-size: 38px;
        font-weight: 620;
        letter-spacing: 0.01em;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }

      .art {
        position: absolute;
        inset: 0 0 0 auto;
        width: 2140px;
      }

      .halo {
        position: absolute;
        border-radius: 50%;
        filter: blur(6px);
      }

      .halo-1 {
        right: 320px;
        top: 170px;
        width: 920px;
        height: 920px;
        background: radial-gradient(circle, rgba(93, 114, 255, 0.26), rgba(93, 114, 255, 0.02) 62%, transparent 72%);
      }

      .halo-2 {
        right: 60px;
        bottom: 80px;
        width: 1040px;
        height: 1040px;
        background: radial-gradient(circle, rgba(30, 103, 255, 0.2), rgba(30, 103, 255, 0.02) 58%, transparent 72%);
      }

      .ring {
        position: absolute;
        border-radius: 36px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.045), rgba(255, 255, 255, 0.015));
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.08),
          0 24px 48px rgba(0, 0, 0, 0.16);
      }

      .ring::before {
        content: "";
        position: absolute;
        inset: 28px;
        border-radius: 26px;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .ring-1 {
        right: 430px;
        top: 300px;
        width: 760px;
        height: 760px;
        transform: rotate(10deg);
      }

      .ring-2 {
        right: 590px;
        top: 470px;
        width: 500px;
        height: 500px;
        transform: rotate(10deg);
      }

      .card {
        position: absolute;
        border-radius: 38px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.03)),
          linear-gradient(135deg, rgba(40, 78, 255, 0.22), rgba(255, 255, 255, 0.015));
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.08),
          0 28px 64px rgba(0, 0, 0, 0.18);
        backdrop-filter: blur(10px);
      }

      .card::before {
        content: "";
        position: absolute;
        left: 34px;
        right: 34px;
        top: 34px;
        height: 2px;
        background: linear-gradient(90deg, rgba(255, 255, 255, 0.26), transparent 70%);
      }

      .card::after {
        content: "";
        position: absolute;
        left: 34px;
        bottom: 34px;
        width: 120px;
        height: 120px;
        border-radius: 28px;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(55, 105, 255, 0.3));
      }

      .card-a {
        right: 760px;
        top: 430px;
        width: 640px;
        height: 860px;
        transform: rotate(-18deg);
      }

      .card-b {
        right: 400px;
        top: 470px;
        width: 680px;
        height: 920px;
        transform: rotate(-6deg);
      }

      .card-c {
        right: 120px;
        top: 320px;
        width: 680px;
        height: 980px;
        transform: rotate(10deg);
      }

      .accent-line {
        position: absolute;
        right: 500px;
        bottom: 246px;
        width: 920px;
        height: 24px;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(255, 255, 255, 0.18), rgba(80, 112, 255, 0.5), rgba(255, 255, 255, 0));
        filter: blur(1px);
        opacity: 0.9;
      }

      .footer {
        position: absolute;
        right: 138px;
        bottom: 118px;
        display: flex;
        align-items: center;
        gap: 22px;
        color: var(--ink-3);
        font-size: 32px;
        font-weight: 650;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .footer .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.42);
      }
    </style>
  </head>
  <body>
    <div class="canvas">
      <div class="frame">
        <section class="content">
          <p class="eyebrow">Developer Profile</p>
          <h1>SAMO DANNI EOOD</h1>
          <p class="subline">Independent software studio by Kirill Markin</p>
          <div class="meta-row">
            <div class="pill">Open-source products</div>
            <div class="pill">Offline-first focus</div>
          </div>
        </section>

        <section class="art" aria-hidden="true">
          <div class="halo halo-1"></div>
          <div class="halo halo-2"></div>
          <div class="ring ring-1"></div>
          <div class="ring ring-2"></div>
          <div class="card card-a"></div>
          <div class="card card-b"></div>
          <div class="card card-c"></div>
          <div class="accent-line"></div>
        </section>

        <div class="footer">
          <span>kirill-markin.com</span>
          <span class="dot"></span>
          <span>Plovdiv, Bulgaria</span>
        </div>
      </div>
    </div>
  </body>
</html>
