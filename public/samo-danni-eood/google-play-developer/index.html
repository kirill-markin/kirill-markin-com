<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAMO DANNI EOOD Google Play Developer Assets</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #09101f;
        --panel: rgba(16, 24, 46, 0.92);
        --panel-border: rgba(255, 255, 255, 0.1);
        --text: #f8faff;
        --muted: #bcc8ec;
        --link: #8fb0ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 48px 20px;
        background:
          radial-gradient(circle at 20% 10%, rgba(77, 121, 255, 0.18), transparent 26%),
          linear-gradient(170deg, #060c19 0%, var(--bg) 56%, #122862 100%);
        color: var(--text);
        font-family: "Avenir Next", "Segoe UI", sans-serif;
      }

      main {
        max-width: 920px;
        margin: 0 auto;
        padding: 32px;
        border: 1px solid var(--panel-border);
        border-radius: 24px;
        background: var(--panel);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 2.3rem;
        line-height: 1.08;
      }

      p {
        margin: 0 0 18px;
        color: var(--muted);
        font-size: 1.02rem;
        line-height: 1.55;
      }

      ul {
        margin: 24px 0;
        padding-left: 20px;
      }

      li {
        margin: 0 0 12px;
        color: var(--muted);
      }

      a {
        color: var(--link);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Google Play Developer Assets</h1>
      <p>
        Generated files for the <code>SAMO DANNI EOOD</code> Google Play developer
        profile. This folder keeps only the final selected files.
      </p>
      <ul>
        <li><a href="./header.html">header.html</a></li>
        <li><a href="./header-google-play-v2.jpg">header-google-play-v2.jpg</a></li>
        <li><a href="./logo.png">logo.png</a></li>
        <li><a href="../">Back to company assets</a></li>
      </ul>
    </main>
  </body>
</html>
