<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAMO DANNI EOOD Assets</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a1024;
        --panel: #121a35;
        --panel-border: rgba(255, 255, 255, 0.1);
        --text: #f6f8ff;
        --muted: #b7c4f3;
        --link: #8fb0ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 48px 20px;
        background:
          radial-gradient(circle at top left, rgba(64, 104, 255, 0.22), transparent 28%),
          linear-gradient(160deg, #060b19 0%, var(--bg) 58%, #12245a 100%);
        color: var(--text);
        font-family: "Avenir Next", "Segoe UI", sans-serif;
      }

      main {
        max-width: 860px;
        margin: 0 auto;
        padding: 32px;
        border: 1px solid var(--panel-border);
        border-radius: 24px;
        background: rgba(18, 26, 53, 0.92);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 2.4rem;
        line-height: 1.05;
      }

      p {
        margin: 0 0 18px;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.55;
      }

      ul {
        margin: 28px 0 0;
        padding-left: 20px;
      }

      li {
        margin: 0 0 12px;
        color: var(--muted);
      }

      a {
        color: var(--link);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>SAMO DANNI EOOD</h1>
      <p>
        Static asset folder for company-related generated materials hosted inside
        <code>kirill-markin.com</code>.
      </p>
      <ul>
        <li>
          <a href="./google-play-developer/">Google Play developer assets</a>
        </li>
        <li>
          <a href="./README.md">README.md</a>
        </li>
      </ul>
    </main>
  </body>
</html>
